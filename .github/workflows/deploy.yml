name: Deploy

# Auto-trigger on push is disabled: data/analytics/bible.duckdb (~280 MB) is
# gitignored, so the GitHub runner has no DB after checkout and Cloud Build
# would package an incomplete image. Backend deploys run manually via
# infra/scripts/deploy.ps1 from a workstation that has the DB on disk.
# To re-enable auto-deploy, host the DB in GCS and add a fetch step here.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

env:
  GCP_PROJECT: verbum-app-bible
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: verbum-api
  ARTIFACT_REPO: verbum-images

jobs:
  # ── Backend → Cloud Run ───────────────────────────────────────────────────
  deploy-backend:
    name: Backend (Cloud Run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: verbum-github-deploy@verbum-app-bible.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build via Cloud Build
        run: |
          gcloud builds submit \
            --tag ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REPO }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }} \
            --machine-type=e2-highcpu-8 \
            --timeout=20m \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REPO }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --service-account verbum-api-runtime@${{ env.GCP_PROJECT }}.iam.gserviceaccount.com \
            --set-secrets GEMINI_API_KEY=GEMINI_API_KEY:latest,ABIBLIA_DIGITAL_TOKEN=ABIBLIA_DIGITAL_TOKEN:latest,SENTRY_DSN=SENTRY_DSN:latest \
            --memory 1Gi --cpu 1 --concurrency 40 --timeout 60 \
            --min-instances 0 --max-instances 3 \
            --allow-unauthenticated --port 8080 \
            --set-env-vars VERBUM_RELEASE=verbum-api@${{ github.sha }}

      - name: Smoke test /health
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} --region=${{ env.GCP_REGION }} --format='value(status.url)')
          curl --fail --max-time 30 "$URL/health" | tee /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json

  # ── Frontend → Firebase Hosting ────────────────────────────────────────────
  deploy-frontend:
    name: Frontend (Firebase Hosting)
    runs-on: ubuntu-latest
    needs: deploy-backend   # ship FE only after BE is healthy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_GA4_MEASUREMENT_ID: ${{ secrets.VITE_GA4_MEASUREMENT_ID }}
          VITE_VERBUM_RELEASE: verbum-frontend@${{ github.sha }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: verbum-app-bible
          entryPoint: ./
